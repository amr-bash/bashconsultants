  offer: The manual export-and-reupload step disappears, and a process that lived in one person's spreadsheet becomes something the whole team can use.
  image: /assets/images/header-image-dev-profile-4069-v1.png
  url: /services/dev/
  systems:
    - Python, JavaScript/TypeScript, and C#/.NET
    - React and Node.js
    - Flutter and React Native
  service:
    - Custom application development
    - API development and integration
    - Legacy system modernization
    - AI-assisted delivery with human code review

- title: IT strategy and consulting
  description: We plan to work ourselves out of a job. Our strategy work favors building your team's capability over creating a permanent dependency on an outside vendor.
